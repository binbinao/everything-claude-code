name: Deploy to Vercel

# Auto-deploy ecc-docs/ to Vercel production on every push to feat/ecc-docs-cn
# (mirrors GitHub Pages deployment at .github/workflows/deploy-docs.yml)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — Vercel personal access token
#                        (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID      — Vercel team/org ID
#                        team_20qpPsbWgX5Oa0lanpZsIBgW  (robinjis-projects)
#   VERCEL_PROJECT_ID  — Vercel project ID
#                        prj_tDRS0aKCU1xUc3c5zNsYMICtsuRu  (ecc-docs)

on:
  push:
    branches:
      - feat/ecc-docs-cn
    paths:
      - 'ecc-docs/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:  # Manual trigger from Actions tab

concurrency:
  group: "vercel-deploy"
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ecc-docs/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Docusaurus site
        working-directory: ecc-docs
        run: npm ci && npm run build

      - name: Deploy to Vercel (Production)
        working-directory: ecc-docs
        run: |
          vercel deploy \
            --prod \
            --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --scope ${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Summary
        if: success()
        run: |
          echo "### ✅ Vercel Deploy Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Production URL**: https://ecc-docs.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Failure summary
        if: failure()
        run: |
          echo "### ❌ Vercel Deploy Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs above for details." >> $GITHUB_STEP_SUMMARY
