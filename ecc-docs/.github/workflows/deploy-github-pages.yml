# Deploy ecc-docs to GitHub Pages
# Triggered on push to main branch or manual dispatch

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ecc-docs/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent duplicate deployments
concurrency:
  group: ecc-docs-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # Build the site
  build:
    name: Build Docusaurus Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ecc-docs/package-lock.json

      - name: Install dependencies
        working-directory: ecc-docs
        run: npm ci

      - name: Build site for GitHub Pages
        working-directory: ecc-docs
        env:
          DEPLOY_TARGET: github
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ecc-docs/build

  # Deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4